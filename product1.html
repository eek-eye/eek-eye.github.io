<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I 伊克西 I I eeks eye I I 2026 - Eeks Eye</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- SF Pro Font -->
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        
        .product-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }
        
        .back-button {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }
        
        .back-button:hover {
            color: #ff006e;
        }
        
        .product-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }
        
        .product-image-container {
            position: relative;
        }
        
        .product-image {
            width: 100%;
            height: auto;
            border: 1px solid #333;
            border-radius: 8px;
        }
        
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        
        .product-title {
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0;
        }
        
        .product-category {
            font-size: 1rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .product-price {
            font-size: 2rem;
            font-weight: 600;
            color: #ff006e;
        }
        
        .product-description {
            font-size: 1rem;
            line-height: 1.6;
            color: #ccc;
        }
        
        .checkout-button {
            background: #ff006e;
            color: #fff;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 1rem;
            display: inline-block;
            text-align: center;
            text-decoration: none;
        }
        
        .checkout-button:hover {
            background: #ff006e;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 0, 110, 0.4);
        }
        
        .checkout-button:active {
            transform: translateY(0);
        }
        
        @media (max-width: 768px) {
            .product-content {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            
            .product-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="product-container">
        <div class="product-header">
            <a href="explore.html" class="back-button">← Back to Explore</a>
        </div>
        
        <div class="product-content">
            <div class="product-image-container">
                <img src="eekseye.png/I 伊克西 I I eeks eye I I 2026.png" alt="I 伊克西 I I eeks eye I I 2026" class="product-image">
            </div>
            
            <div class="product-info">
                <h1 class="product-title">I 伊克西 I I eeks eye I I 2026</h1>
                <div class="product-category">Runway</div>
                <div class="product-price" data-price="200">$200</div>
                <div class="product-description">
                    <p>Exclusive design from the Eeks Eye collection. This piece represents the fusion of contemporary art and fashion.</p>
                </div>
                <a href="https://fuchendeonze.wixsite.com/eekseye-shop" target="_blank" rel="noopener noreferrer" class="checkout-button">Checkout</a>
            </div>
        </div>
    </div>
    <script src="translation-system.js"></script>
</body>
</html>
