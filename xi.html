<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XI - Socials</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #1877f2;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'Inter', Arial, sans-serif;
        }
        .xi-container {
            background: rgba(0,0,0,0.15);
            border-radius: 18px;
            padding: 2.5rem 2rem 2rem 2rem;
            box-shadow: 0 4px 32px #0003;
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 1.2rem;
            letter-spacing: 2px;
        }
        .social-links {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2.5rem;
            margin-top: 1.5rem;
        }
        .social-links a {
            color: #fff;
            font-size: 2.2rem;
            transition: color 0.2s, transform 0.2s;
            position: relative;
            overflow: visible;
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }
        .social-links a::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2.8rem;
            height: 2.8rem;
            background: rgba(255, 215, 0, 0.3); /* gold overlay */
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 1;
        }
        .social-links a:hover::after {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1);
        }
        .social-links a:hover {
            color: #ffd700;
            transform: scale(1.15);
        }
        .social-label {
            display: inline-block;
            margin-top: 0;
            font-size: 1.25rem;
            color: #e0e0e0;
            letter-spacing: 1px;
        }
        .social-img-icon {
            width: 3rem;
            height: 3rem;
            object-fit: contain;
            display: inline-block;
            vertical-align: middle;
            filter: drop-shadow(0 0 2px #fff8);
            transition: transform 0.2s;
        }
        .social-links a:hover .social-img-icon {
            transform: scale(1.18);
        }
        .social-img-icon.instagram {
            width: 3.5rem;
            height: 3.5rem;
        }
        .social-img-icon.xicon {
            width: 2.2rem;
            height: 2.2rem;
            margin-left: 0.5rem;
        }
        .social-img-icon.tiktok {
            width: 2.4rem;
            height: 2.4rem;
            margin-left: 0.5rem;
        }
        .social-img-icon.explorelink {
            width: 2.4rem;
            height: 2.4rem;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="xi-container">
        <h1>XI</h1>
        <p>Connect with me on my socials:</p>
        <div class="social-links">
            <a href="https://www.instagram.com/eeks.eye/" target="_blank" title="Instagram"><img src="images/instagramIcon.png" alt="Instagram" class="social-img-icon instagram"><span class="social-label">Instagram</span></a>
            <a href="https://twitter.com/yourusername" target="_blank" title="Twitter"><img src="images/xicon.png" alt="Twitter/X" class="social-img-icon xicon"><span class="social-label">X</span></a>
            <a href="https://tiktok.com/@yourusername" target="_blank" title="TikTok"><img src="images/tiktok.png" alt="TikTok" class="social-img-icon tiktok"><span class="social-label">TikTok</span></a>
            <a href="startup.html" target="_blank" title="Web Page"><img src="images/explorelink.png" alt="Web Page" class="social-img-icon explorelink"><span class="social-label">Web Page</span></a>
        </div>
    </div>
    <script src="translation-system.js"></script>
</body>
</html>
