<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I 满月 I eekseye I 2026 - Eeks Eye</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- SF Pro Font -->
    <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        
        .product-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }
        
        .back-button {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }
        
        .back-button:hover {
            color: #ff006e;
        }
        
        .product-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }
        
        .product-image-container {
            position: relative;
        }
        
        .product-image {
            width: 100%;
            height: auto;
            border: 1px solid #333;
            border-radius: 8px;
        }
        
        .product-info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        
        .product-title {
            font-size: 2.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0;
        }
        
        .product-category {
            font-size: 1rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .product-price {
            font-size: 2rem;
            font-weight: 600;
            color: #ff006e;
        }
        
        .product-description {
            font-size: 1rem;
            line-height: 1.6;
            color: #ccc;
        }
        
        @media (max-width: 768px) {
            .product-content {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            
            .product-title {
                font-size: 2rem;
            }
        }
        .page-transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 9999;
            opacity: 1;
            pointer-events: none;
            transition: opacity 2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .page-transition-overlay.fade-out { opacity: 0; }
        .logo-transition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            opacity: 0;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            pointer-events: none;
        }
        .logo-transition-overlay.active { opacity: 1; }
        .transition-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            color: #fff;
            opacity: 0;
            z-index: 1001;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div class="page-transition-overlay"></div>
    <div class="product-container">
        <div class="product-header">
            <a href="explore.html" class="back-button">← Back to Explore</a>
        </div>
        
        <div class="product-content">
            <div class="product-image-container">
                <img src="eekseye.png/I 满月 I eekseye I 2026.png" alt="I 满月 I eekseye I 2026" class="product-image">
            </div>
            
            <div class="product-info">
                <h1 class="product-title">I 满月 I eekseye I 2026</h1>
                <div class="product-category">Runway</div>
                <div class="product-price" data-price="275">$275.00</div>
                <div class="product-description">
                    <p>Exclusive design from the Eeks Eye collection. This piece represents the fusion of contemporary art and fashion.</p>
                </div>
            </div>
        </div>
    </div>
    <div class="logo-transition-overlay"></div>
    <div class="transition-text">XI</div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const overlay = document.querySelector('.page-transition-overlay');
            setTimeout(() => overlay && overlay.classList.add('fade-out'), 500);
        });
        const logoOverlay = document.querySelector('.logo-transition-overlay');
        const transitionText = document.querySelector('.transition-text');
        const pageOverlay = document.querySelector('.page-transition-overlay');
        function createTransition(destination) {
            if (!destination || destination === '#' || destination.startsWith('javascript:')) return;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => {
                if (logoOverlay) logoOverlay.classList.add('active');
                if (pageOverlay) pageOverlay.classList.remove('fade-out');
            }, 100);
            setTimeout(() => {
                if (transitionText) {
                    transitionText.style.opacity = '1';
                    transitionText.style.transform = 'translate(-50%, -50%) scale(1.1)';
                    setTimeout(() => { transitionText.style.transform = 'translate(-50%, -50%) scale(1)'; }, 200);
                }
            }, 500);
            setTimeout(() => { window.location.href = destination; }, 1600);
        }
        document.querySelectorAll('a[href]').forEach(link => {
            const href = link.getAttribute('href');
            if (!href || href === '#' || link.target === '_blank' || link.hasAttribute('download')) return;
            const isInternalHtml = (href.endsWith('.html') || href === 'index.html' || href === '/' || href.startsWith('./')) && !href.startsWith('http');
            if (isInternalHtml) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    createTransition(this.href);
                });
            }
        });
    </script>
    <script src="translation-system.js"></script>
</body>
</html>
